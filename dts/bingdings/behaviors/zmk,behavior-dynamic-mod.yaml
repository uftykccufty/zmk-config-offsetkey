description: Dynamic Modifier / Layer Switch Behavior

compatible: "zmk,behavior-dynamic-mod"

properties:
  layer:
    type: int
    required: true
    description: Layer to activate on hold
  mod:
    type: int
    required: true
    description: Modifier keycode to send when trigger key is pressed
  trigger-positions:
    type: array
    required: true
    description: Key positions that trigger modifier mode
